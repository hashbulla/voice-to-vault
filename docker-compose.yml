## =============================================================================
## voice-to-vault — Docker Compose
## =============================================================================
## Runs OpenClaw and supporting services on the Hetzner CX22 VPS.
##
## Usage:
##   cp .env.template .env && $EDITOR .env   # fill all values
##   docker compose up -d
##   docker compose logs -f openclaw
## =============================================================================

services:

  ## ── OpenClaw automation engine ─────────────────────────────────────────────
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: voice-to-vault-openclaw
    restart: unless-stopped
    ## FIX C: Run as non-root uid 1000 — attacker cannot escalate to VPS root
    ## even if a code-injection via Telegram caption/Whisper output succeeds.
    user: "1000:1000"
    ## FIX C: Drop ALL Linux capabilities — vault-writer needs no special syscalls.
    cap_drop:
      - ALL
    ## FIX C: Read-only root filesystem — limits post-exploitation persistence.
    read_only: true
    ## FIX C: Writable /tmp via tmpfs — in-memory only, cleared on restart.
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:8080:8080"   # bind to localhost only — Caddy/nginx proxies HTTPS
    volumes:
      ## OpenClaw config + skills (read-only mount)
      - ./openclaw:/app/openclaw:ro
      ## SQLite persistence for deduplication and audit
      - openclaw-data:/data
      ## SSH deploy key for vault push (read-only)
      - ${VAULT_DEPLOY_KEY_PATH}:/home/openclaw/.ssh/vault_deploy_key:ro
      ## FIX C: Vault clone cache — named volume owned by uid 1000:1000
      - vault_clone:/home/openclaw/vault:rw
    environment:
      ## Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_USER_ID: ${TELEGRAM_ALLOWED_USER_ID}
      ## OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-fr}
      WHISPER_PROMPT: ${WHISPER_PROMPT}
      ## Anthropic
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-haiku-4-5}
      ## GitHub vault repo
      VAULT_REPO: ${VAULT_REPO}
      VAULT_DEPLOY_KEY_PATH: /home/openclaw/.ssh/vault_deploy_key
      VAULT_BRANCH: ${VAULT_BRANCH:-main}
      VAULT_CLONE_DIR: /home/openclaw/vault
      ## OpenClaw
      OPENCLAW_PORT: ${OPENCLAW_PORT:-8080}
      OPENCLAW_WEBHOOK_SECRET: ${OPENCLAW_WEBHOOK_SECRET}
      OPENCLAW_WEBHOOK_URL: ${OPENCLAW_WEBHOOK_URL}
      ## Trigger daemon
      TRIGGER_SECRET: ${TRIGGER_SECRET}
      TRIGGER_DAEMON_URL: ${TRIGGER_DAEMON_URL:-http://host.docker.internal:9999}
      ## Optional
      DEBUG: ${DEBUG:-0}
      MAX_AUDIO_BYTES: ${MAX_AUDIO_BYTES:-26214400}
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-voice-to-vault[bot]}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-bot@voice-to-vault.local}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ## ── Caddy — TLS termination and reverse proxy ──────────────────────────────
  ## Caddy auto-provisions Let's Encrypt TLS for OPENCLAW_WEBHOOK_URL domain.
  ## Comment this out if you handle TLS at the host level or with a CDN.
  caddy:
    image: caddy:2-alpine
    container_name: voice-to-vault-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
      ## FIX E: Port 2019 (Caddy admin API) is intentionally NOT published.
      ## admin off is set in Caddyfile — no internal listener exists.
      ## Omitting 2019 here is defence-in-depth against misconfiguration.
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      OPENCLAW_DOMAIN: ${OPENCLAW_DOMAIN:-vault.example.com}
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    depends_on:
      openclaw:
        condition: service_healthy

volumes:
  openclaw-data:
    name: voice-to-vault-openclaw-data
  ## FIX C: Named volume for vault clone — bound to host path owned by uid 1000:1000.
  ## Provisioned by hetzner/setup.sh: mkdir -p + chown 1000:1000.
  vault_clone:
    driver: local
    driver_opts:
      type: none
      o: bind,uid=1000,gid=1000
      device: /opt/voice-to-vault/vault-clone
  caddy-data:
    name: voice-to-vault-caddy-data
  caddy-config:
    name: voice-to-vault-caddy-config
